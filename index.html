<!DOCTYPE html>
<html>
<head>
  <title>Van Project</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
    }

    #map {
      position: relative;
      width: 800px;
      height: 500px;
      margin: auto;
      background: #d0ecff;
      border: 2px solid black;
    }

    #van {
      width: 50px;
      height: 50px;
      background: orange;
      position: absolute;
      top: 20px;
      left: 20px;
      cursor: grab;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
    }

    .point {
      width: 60px;
      height: 60px;
      background: red;
      position: absolute;
      border-radius: 50%;
    }

    #infoBox {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h1>Road Trip Project 🚐</h1>

<div id="map">
  <div id="van">🚐</div>

  <div class="point" style="top:100px; left:150px;" data-info="This is stop 1"></div>
  <div class="point" style="top:300px; left:200px;" data-info="This is stop 2"></div>
  <div class="point" style="top:200px; left:500px;" data-info="This is stop 3"></div>
  <div class="point" style="top:400px; left:600px;" data-info="This is stop 4"></div>
  <div class="point" style="top:50px; left:650px;" data-info="This is stop 5"></div>
</div>

<div id="infoBox">Drag the van to a location</div>

<script>
const van = document.getElementById("van");
const points = document.querySelectorAll(".point");
const infoBox = document.getElementById("infoBox");

let dragging = false;

// Start dragging
van.addEventListener("mousedown", () => {
  dragging = true;
});

// Stop dragging
document.addEventListener("mouseup", () => {
  dragging = false;
});

// Move van with mouse
document.addEventListener("mousemove", (e) => {
  if (!dragging) return;

  const mapRect = document.getElementById("map").getBoundingClientRect();

  let x = e.clientX - mapRect.left - 25;
  let y = e.clientY - mapRect.top - 25;

  van.style.left = x + "px";
  van.style.top = y + "px";

  checkCollision();
});

// Detect when van touches a point
function checkCollision() {
  const vanRect = van.getBoundingClientRect();

  points.forEach(point => {
    const pointRect = point.getBoundingClientRect();

    const isTouching =
      vanRect.left < pointRect.right &&
      vanRect.right > pointRect.left &&
      vanRect.top < pointRect.bottom &&
      vanRect.bottom > pointRect.top;

    if (isTouching) {
      infoBox.textContent = point.dataset.info;
      point.style.background = "green"; // mark visited
    }
  });
}
</script>

</body>
</html>
