<!DOCTYPE html>
<html>
<head>
  <title>East Coast Road Trip</title>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #eee;
    }

    #map {
      position: relative;
      width: 900px;
      height: 600px;
      margin: auto;
      background: url("map.jpg");
      background-size: 900px 600px;
      background-repeat: no-repeat;
      border: 3px solid black;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    #van {
      position: absolute;
      width: 70px;
      cursor: grab;
    }

    #infoBox {
      margin-top: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    #popup {
      display: none;
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      border: 2px solid black;
      padding: 15px;
    }

    #popup img {
      width: 250px;
    }
  </style>
</head>

<body>

<h1>East Coast Road Trip 🚐</h1>

<div id="map">
  <canvas id="road" width="900" height="600"></canvas>
  <img id="van" src="van.png">
</div>

<div id="infoBox">Start in Birmingham, Alabama</div>

<div id="popup">
  <h2 id="popupTitle"></h2>
  <img id="popupImg">
</div>

<script>
const canvas = document.getElementById("road");
const ctx = canvas.getContext("2d");
const van = document.getElementById("van");
const infoBox = document.getElementById("infoBox");

const popup = document.getElementById("popup");
const popupTitle = document.getElementById("popupTitle");
const popupImg = document.getElementById("popupImg");

const path = [
  {x: 648, y: 407, name: "Birmingham, Alabama", img: "birmingham.jpg"},
  {x: 691, y: 397, name: "Atlanta, Georgia", img: "atlanta.jpg"},
  {x: 799, y: 267, name: "Washington D.C.", img: "dc.jpg"},
  {x: 824, y: 239, name: "Philadelphia, Pennsylvania", img: "philly.jpg"},
  {x: 839, y: 217, name: "New York City, New York", img: "nyc.jpg"}
];

let dragging = false;
let progress = 0;
let lastMouseX = 0;

// 🎨 DRAW PATH (curved)
function drawPath(p, color, glow=false) {
  ctx.lineWidth = glow ? 12 : 6;
  ctx.strokeStyle = color;

  if (glow) {
    ctx.shadowBlur = 15;
    ctx.shadowColor = "lime";
  } else {
    ctx.shadowBlur = 0;
  }

  ctx.beginPath();
  ctx.moveTo(path[0].x, path[0].y);

  let total = path.length - 1;
  let current = Math.floor(p * total);
  let t = (p * total) % 1;

  for (let i = 1; i <= current; i++) {
    let midX = (path[i].x + path[i-1].x) / 2;
    let midY = (path[i].y + path[i-1].y) / 2;
    ctx.quadraticCurveTo(path[i-1].x, path[i-1].y, midX, midY);
  }

  if (current < total) {
    let a = path[current];
    let b = path[current + 1];
    let x = a.x + (b.x - a.x) * t;
    let y = a.y + (b.y - a.y) * t;
    ctx.lineTo(x, y);
  }

  ctx.stroke();
}

// 🚐 UPDATE VAN
function updateVan() {
  let total = path.length - 1;
  let current = Math.floor(progress * total);
  let t = (progress * total) % 1;

  let a = path[current];
  let b = path[Math.min(current + 1, total)];

  let x = a.x + (b.x - a.x) * t;
  let y = a.y + (b.y - a.y) * t;

  van.style.left = (x - 35) + "px";
  van.style.top = (y - 35) + "px";

  // popup logic
  let snapped = false;
  for (let i = 0; i < path.length; i++) {
    if (Math.hypot(x - path[i].x, y - path[i].y) < 10) {
      snapped = true;
      popup.style.display = "block";
      popupTitle.textContent = path[i].name;
      popupImg.src = path[i].img;
      infoBox.textContent = path[i].name;
    }
  }

  if (!snapped) popup.style.display = "none";

  // redraw
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawPath(1, "gray");          // full path
  drawPath(progress, "lime", true); // glowing progress
}

// 🎯 DRAG SYSTEM (RELATIVE = FIXES BACKWARDS)
van.addEventListener("mousedown", (e) => {
  dragging = true;
  lastMouseX = e.clientX;
});

document.addEventListener("mouseup", () => dragging = false);

document.addEventListener("mousemove", (e) => {
  if (!dragging) return;

  let dx = e.clientX - lastMouseX;
  lastMouseX = e.clientX;

  progress += dx / 500; // sensitivity
  progress = Math.max(0, Math.min(1, progress));

  updateVan();
});

// INIT
updateVan();
</script>

</body>
</html>
