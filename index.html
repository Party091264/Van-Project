<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      text-align: center;
      font-family: Arial;
    }

    #map {
      position: relative;
      width: 900px;
      height: 600px;
      margin: auto;
      background: url("map.jpg");
      background-size: cover;
      border: 2px solid black;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    #van {
      position: absolute;
      width: 60px;
      cursor: grab;
      pointer-events: none;
    }

    #infoBox {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h2>East Coast Road Trip 🚐</h2>

<div id="map">
  <canvas id="road" width="900" height="600"></canvas>
  <img id="van" src="van.png">
</div>

<div id="infoBox">Drag along the route</div>

<script>
const canvas = document.getElementById("road");
const ctx = canvas.getContext("2d");
const van = document.getElementById("van");
const infoBox = document.getElementById("infoBox");

// 📍 Path points (you can tweak these to match your map visually)
const path = [
  {x: 300, y: 500, name: "Birmingham, Alabama"},
  {x: 350, y: 450, name: "Atlanta, Georgia"},
  {x: 450, y: 300, name: "Washington D.C."},
  {x: 500, y: 250, name: "Philadelphia, Pennsylvania"},
  {x: 550, y: 200, name: "New York City, New York"}
];

let progress = 0;

// Draw full path (gray line)
function drawBasePath() {
  ctx.strokeStyle = "gray";
  ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.moveTo(path[0].x, path[0].y);

  for (let i = 1; i < path.length; i++) {
    ctx.lineTo(path[i].x, path[i].y);
  }

  ctx.stroke();
}

// Draw filled path (green progress)
function drawProgress(p) {
  ctx.strokeStyle = "lime";
  ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.moveTo(path[0].x, path[0].y);

  let total = path.length - 1;
  let current = Math.floor(p * total);
  let t = (p * total) % 1;

  for (let i = 1; i <= current; i++) {
    ctx.lineTo(path[i].x, path[i].y);
  }

  if (current < total) {
    let x = path[current].x + (path[current+1].x - path[current].x) * t;
    let y = path[current].y + (path[current+1].y - path[current].y) * t;
    ctx.lineTo(x, y);
  }

  ctx.stroke();
}

// Move van along path
function updateVan(p) {
  let total = path.length - 1;
  let current = Math.floor(p * total);
  let t = (p * total) % 1;

  let x = path[current].x + (path[current+1].x - path[current].x) * t;
  let y = path[current].y + (path[current+1].y - path[current].y) * t;

  van.style.left = (x - 30) + "px";
  van.style.top = (y - 30) + "px";

  infoBox.textContent = path[current].name;
}

// Drag logic (horizontal slider style)
document.addEventListener("mousemove", (e) => {
  if (e.buttons !== 1) return;

  let rect = canvas.getBoundingClientRect();
  let x = e.clientX - rect.left;

  progress = Math.max(0, Math.min(1, x / rect.width));

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBasePath();
  drawProgress(progress);
  updateVan(progress);
});

// Initial draw
drawBasePath();
updateVan(0);

</script>

</body>
</html>
