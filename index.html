<!DOCTYPE html>
<html>
<head>
  <title>East Coast Road Trip</title>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #eee;
    }

    #map {
      position: relative;
      width: 900px;
      height: 600px;
      margin: auto;
      background: url("map.jpg");
      background-size: 900px 600px;
      background-repeat: no-repeat;
      border: 3px solid black;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    #van {
      position: absolute;
      width: 70px;
      cursor: grab;
      transition: left 0.3s ease, top 0.3s ease;
    }

    #infoBox {
      margin-top: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    #popup {
      display: none;
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      border: 2px solid black;
      padding: 15px;
      z-index: 10;
    }

    #popup img {
      width: 250px;
    }

    #closeBtn {
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>East Coast Road Trip 🚐</h1>

<div id="map">
  <canvas id="road" width="900" height="600"></canvas>
  <img id="van" src="van.png">
</div>

<div id="infoBox">Start in Birmingham, Alabama</div>

<div id="popup">
  <h2 id="popupTitle"></h2>
  <img id="popupImg">
  <div id="closeBtn">Close</div>
</div>

<script>
const canvas = document.getElementById("road");
const ctx = canvas.getContext("2d");
const van = document.getElementById("van");
const infoBox = document.getElementById("infoBox");

const popup = document.getElementById("popup");
const popupTitle = document.getElementById("popupTitle");
const popupImg = document.getElementById("popupImg");

document.getElementById("closeBtn").onclick = () => popup.style.display = "none";

// YOUR COORDINATES
const path = [
  {x: 648, y: 407, name: "Birmingham, Alabama", img: "birmingham.jpg"},
  {x: 691, y: 397, name: "Atlanta, Georgia", img: "atlanta.jpg"},
  {x: 799, y: 267, name: "Washington D.C.", img: "dc.jpg"},
  {x: 824, y: 239, name: "Philadelphia, Pennsylvania", img: "philly.jpg"},
  {x: 839, y: 217, name: "New York City, New York", img: "nyc.jpg"}
];

let currentStop = 0;
let dragging = false;

// draw curved base path
function drawBasePath() {
  ctx.strokeStyle = "gray";
  ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.moveTo(path[0].x, path[0].y);

  for (let i = 1; i < path.length; i++) {
    let midX = (path[i].x + path[i-1].x) / 2;
    let midY = (path[i].y + path[i-1].y) / 2;
    ctx.quadraticCurveTo(path[i-1].x, path[i-1].y, midX, midY);
  }

  ctx.lineTo(path[path.length-1].x, path[path.length-1].y);
  ctx.stroke();
}

// snap to city
function snapToPoint(index) {
  let p = path[index];

  van.style.left = (p.x - 35) + "px";
  van.style.top = (p.y - 35) + "px";

  infoBox.textContent = p.name;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBasePath();

  ctx.strokeStyle = "lime";
  ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.moveTo(path[0].x, path[0].y);

  for (let i = 1; i <= index; i++) {
    ctx.lineTo(path[i].x, path[i].y);
  }

  ctx.stroke();

  ctx.fillStyle = "yellow";
  for (let i = 0; i <= index; i++) {
    ctx.beginPath();
    ctx.arc(path[i].x, path[i].y, 7, 0, Math.PI * 2);
    ctx.fill();
  }

  popup.style.display = "block";
  popupTitle.textContent = p.name;
  popupImg.src = p.img;

  if (index === path.length - 1) {
    infoBox.textContent = "🎉 You made it to New York City!";
  }
}

// drag only when clicking van
van.addEventListener("mousedown", () => dragging = true);
document.addEventListener("mouseup", () => dragging = false);

document.addEventListener("mousemove", (e) => {
  if (!dragging) return;

  let rect = canvas.getBoundingClientRect();
  let mouseX = e.clientX - rect.left;
  let mouseY = e.clientY - rect.top;

  let next = path[currentStop + 1];
  if (!next) return;

  // follow mouse smoothly
  van.style.left = (mouseX - 35) + "px";
  van.style.top = (mouseY - 35) + "px";

  let dx = mouseX - next.x;
  let dy = mouseY - next.y;
  let dist = Math.sqrt(dx*dx + dy*dy);

  if (dist < 50) {
    currentStop++;
    snapToPoint(currentStop);
  }
});

// init
drawBasePath();
snapToPoint(0);

</script>

</body>
</html>
