<!DOCTYPE html>
<html>
<head>
  <title>East Coast Road Trip</title>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #eee;
    }

    #map {
      position: relative;
      width: 900px;
      height: 600px;
      margin: auto;
      background: url("map.jpg");
      background-size: cover;
      border: 3px solid black;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    #van {
      position: absolute;
      width: 70px;
      pointer-events: none;
    }

    #infoBox {
      margin-top: 15px;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>East Coast Road Trip 🚐</h1>

<div id="map">
  <canvas id="road" width="900" height="600"></canvas>
  <img id="van" src="van.png">
</div>

<div id="infoBox">Start in Birmingham, Alabama</div>

<script>
const canvas = document.getElementById("road");
const ctx = canvas.getContext("2d");
const van = document.getElementById("van");
const infoBox = document.getElementById("infoBox");

// 📍 Adjust these coordinates if needed
const path = [
  {x: 320, y: 500, name: "Birmingham, Alabama"},
  {x: 370, y: 450, name: "Atlanta, Georgia"},
  {x: 480, y: 300, name: "Washington D.C."},
  {x: 530, y: 250, name: "Philadelphia, Pennsylvania"},
  {x: 580, y: 200, name: "New York City, New York"}
];

let currentStop = 0;
let isDragging = false;

// Draw base path
function drawBasePath() {
  ctx.strokeStyle = "gray";
  ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.moveTo(path[0].x, path[0].y);

  for (let i = 1; i < path.length; i++) {
    ctx.lineTo(path[i].x, path[i].y);
  }

  ctx.stroke();
}

// Snap system
function snapToPoint(index) {
  let point = path[index];

  // Move van
  van.style.left = (point.x - 35) + "px";
  van.style.top = (point.y - 35) + "px";

  // Update text
  infoBox.textContent = point.name;

  // Redraw progress line
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBasePath();

  ctx.strokeStyle = "lime";
  ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.moveTo(path[0].x, path[0].y);

  for (let i = 1; i <= index; i++) {
    ctx.lineTo(path[i].x, path[i].y);
  }

  ctx.stroke();

  // Mark visited points
  ctx.fillStyle = "yellow";
  for (let i = 0; i <= index; i++) {
    ctx.beginPath();
    ctx.arc(path[i].x, path[i].y, 8, 0, Math.PI * 2);
    ctx.fill();
  }

  // Final message
  if (index === path.length - 1) {
    infoBox.textContent = "🎉 You made it to New York City!";
  }
}

// Mouse controls
document.addEventListener("mousedown", () => {
  isDragging = true;
});

document.addEventListener("mouseup", () => {
  isDragging = false;
});

document.addEventListener("mousemove", (e) => {
  if (!isDragging) return;

  let rect = canvas.getBoundingClientRect();
  let mouseX = e.clientX - rect.left;
  let mouseY = e.clientY - rect.top;

  let nextPoint = path[currentStop + 1];
  if (!nextPoint) return;

  let dx = mouseX - nextPoint.x;
  let dy = mouseY - nextPoint.y;
  let distance = Math.sqrt(dx * dx + dy * dy);

  // SNAP DISTANCE (adjust if needed)
  if (distance < 50) {
    currentStop++;
    snapToPoint(currentStop);
  }
});

// Initial draw
drawBasePath();
snapToPoint(0);

</script>

</body>
</html>
