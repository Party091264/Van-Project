<!DOCTYPE html>
<html>
<head>
  <title>East Coast Road Trip</title>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #eee;
    }

    #map {
      position: relative;
      width: 900px;
      height: 600px;
      margin: auto;
      background: url("map.jpg");
      background-size: 900px 600px;
      background-repeat: no-repeat;
      border: 3px solid black;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    #van {
      position: absolute;
      width: 70px;
      cursor: grab;
      transition: left 0.2s linear, top 0.2s linear;
    }

    #infoBox {
      margin-top: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    #popup {
      display: none;
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      border: 2px solid black;
      padding: 15px;
    }

    #popup img {
      width: 250px;
    }
  </style>
</head>

<body>

<h1>East Coast Road Trip 🚐</h1>

<div id="map">
  <canvas id="road" width="900" height="600"></canvas>
  <img id="van" src="van.png">
</div>

<div id="infoBox">Start in Birmingham, Alabama</div>

<div id="popup">
  <h2 id="popupTitle"></h2>
  <img id="popupImg">
</div>

<script>
const canvas = document.getElementById("road");
const ctx = canvas.getContext("2d");
const van = document.getElementById("van");
const infoBox = document.getElementById("infoBox");

const popup = document.getElementById("popup");
const popupTitle = document.getElementById("popupTitle");
const popupImg = document.getElementById("popupImg");

// YOUR COORDS
const path = [
  {x: 648, y: 407, name: "Birmingham, Alabama", img: "birmingham.jpg"},
  {x: 691, y: 397, name: "Atlanta, Georgia", img: "atlanta.jpg"},
  {x: 799, y: 267, name: "Washington D.C.", img: "dc.jpg"},
  {x: 824, y: 239, name: "Philadelphia, Pennsylvania", img: "philly.jpg"},
  {x: 839, y: 217, name: "New York City, New York", img: "nyc.jpg"}
];

let currentStop = 0;
let dragging = false;

// 🔥 DRAW CURVED PATH (used for BOTH gray + green)
function drawPath(upToIndex, color) {
  ctx.strokeStyle = color;
  ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.moveTo(path[0].x, path[0].y);

  for (let i = 1; i <= upToIndex; i++) {
    let midX = (path[i].x + path[i-1].x) / 2;
    let midY = (path[i].y + path[i-1].y) / 2;
    ctx.quadraticCurveTo(path[i-1].x, path[i-1].y, midX, midY);
  }

  ctx.stroke();
}

// snap to point
function snapToPoint(index) {
  let p = path[index];

  van.style.left = (p.x - 35) + "px";
  van.style.top = (p.y - 35) + "px";

  infoBox.textContent = p.name;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // full gray path
  drawPath(path.length - 1, "gray");

  // progress green path
  drawPath(index, "lime");

  // dots on top
  ctx.fillStyle = "yellow";
  for (let i = 0; i <= index; i++) {
    ctx.beginPath();
    ctx.arc(path[i].x, path[i].y, 6, 0, Math.PI * 2);
    ctx.fill();
  }

  popup.style.display = "block";
  popupTitle.textContent = p.name;
  popupImg.src = p.img;
}

// ONLY drag van
van.addEventListener("mousedown", () => dragging = true);
document.addEventListener("mouseup", () => dragging = false);

document.addEventListener("mousemove", (e) => {
  if (!dragging) return;

  let rect = canvas.getBoundingClientRect();
  let mouseX = e.clientX - rect.left;
  let mouseY = e.clientY - rect.top;

  let next = path[currentStop + 1];
  if (!next) return;

  // direction to next point
  let dx = next.x - path[currentStop].x;
  let dy = next.y - path[currentStop].y;

  let progressX = mouseX - path[currentStop].x;
  let progressY = mouseY - path[currentStop].y;

  let dot = (progressX * dx + progressY * dy) / (dx*dx + dy*dy);

  // clamp between 0 and 1
  dot = Math.max(0, Math.min(1, dot));

  let x = path[currentStop].x + dx * dot;
  let y = path[currentStop].y + dy * dot;

  van.style.left = (x - 35) + "px";
  van.style.top = (y - 35) + "px";

  // snap when near next point
  let dist = Math.hypot(mouseX - next.x, mouseY - next.y);
  if (dist < 40) {
    currentStop++;
    snapToPoint(currentStop);
  }
});

// init
snapToPoint(0);
</script>

</body>
</html>
